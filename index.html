<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATEŞOĞLU MARKET PRO</title>

<style>
body { font-family:Arial; background:#111; color:#fff; padding:10px; }
h1 { text-align:center; color:#00d084; }

input, button {
 width:100%; padding:10px; margin:5px 0;
 border:none; border-radius:8px;
}

button { background:#00d084; color:white; cursor:pointer; }

.card {
 background:#222;
 padding:10px;
 margin-top:10px;
 border-radius:10px;
}

.tabs button { width:24%; }
.page { display:none; }

.small-info{
 background:#1a1a1a;
 padding:10px;
 border-radius:10px;
 margin:10px 0;
 color:#00d084;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<div id="loginPage">
<h2>🔐 Giriş</h2>
<input id="user" placeholder="Kullanıcı">
<input id="pass" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>
</div>

<div id="app" style="display:none">

<h1>🛒 ATEŞOĞLU MARKET PRO</h1>

<div class="small-info">
💰 KASA: <b id="kasaText">0</b> ₺
<button onclick="kasaSifirla()">🧨 Kasayı Sıfırla</button>
</div>

<div class="tabs">
<button onclick="show('urun')">Ürün</button>
<button onclick="show('satis')">Satış</button>
<button onclick="show('barkod')">Barkod</button>
<button onclick="show('rapor')">Rapor</button>
</div>

<!-- ÜRÜN -->
<div id="urun" class="page">
<input id="ad" placeholder="Ürün adı">
<input id="fiyat" type="number" placeholder="Fiyat">
<input id="stok" type="number" placeholder="Stok">
<input id="kod" placeholder="Barkod">

<button onclick="urunEkle()">Ekle</button>
<button onclick="tumStokSifirla()">🧨 Tüm Stokları Sıfırla</button>

<div id="urunList"></div>
</div>

<!-- SATIŞ -->
<div id="satis" class="page">
<input id="ara" placeholder="Ara" onkeyup="filtre()">

<div id="urunSec"></div>

<h3>🛒 Sepet</h3>
<div id="sepet"></div>

<h3>Toplam: <span id="toplam">0</span> ₺</h3>

<!-- 💳 ÖDEME TİPİ -->
<button onclick="odemeTip='Nakit'">💵 Nakit</button>
<button onclick="odemeTip='POS'">💳 POS</button>

<h4>Seçilen: <span id="odemeText">Yok</span></h4>

<button onclick="satis()">Satışı Bitir</button>

<div id="fatura" class="card"></div>

</div>

<!-- BARKOD -->
<div id="barkod" class="page">
<button onclick="kamera()">Kamera Aç</button>
<div id="reader"></div>
</div>

<!-- RAPOR -->
<div id="rapor" class="page">
<canvas id="chart"></canvas>

<div class="card" id="raporPanel"></div>

<button onclick="raporSifirla()">🧨 Raporu Sıfırla</button>
<button onclick="excel()">Excel indir</button>
</div>

</div>

<script>

let urunler = JSON.parse(localStorage.getItem("urunler")) || [];
let sepet = [];
let kasa = Number(localStorage.getItem("kasa")) || 0;

// 📊 SATIŞ KAYDI (RAPOR)
let satislar = JSON.parse(localStorage.getItem("satislar")) || [];

let odemeTip = null;

// LOGIN
function login(){
 if(user.value=="admin" && pass.value=="1234"){
  loginPage.style.display="none";
  app.style.display="block";
  show("urun");
 }
}

// SAYFA
function show(id){
 document.querySelectorAll(".page").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
 render();
}

// 💾 SAVE
function save(){
 localStorage.setItem("urunler", JSON.stringify(urunler));
 localStorage.setItem("kasa", kasa);
 localStorage.setItem("satislar", JSON.stringify(satislar));
}

// ➕ ÜRÜN EKLE
function urunEkle(){
 urunler.push({
  ad: ad.value,
  fiyat: Number(fiyat.value),
  stok: Number(stok.value),
  kod: kod.value
 });

 save();
 render();
}

// 🗑️ ÜRÜN SİL
function urunSil(i){
 urunler.splice(i,1);
 save();
 render();
}

// 🧨 STOK SIFIRLA
function tumStokSifirla(){
 if(!confirm("Tüm ürünler silinecek")) return;
 urunler = [];
 save();
 render();
}

// 💰 KASA SIFIRLA
function kasaSifirla(){
 if(!confirm("Kasa sıfırlanacak")) return;
 kasa = 0;
 save();
 render();
}

// 📊 RENDER
function render(){

 kasaText.innerText = kasa;

 urunList.innerHTML = urunler.map((u,i)=>
 `<div class="card">
  ${u.ad} - ${u.fiyat}₺ - Stok:${u.stok}
  <button onclick="urunSil(${i})">Sil</button>
 </div>`
 ).join("");

 urunSec.innerHTML = urunler.map((u,i)=>
 `<div class="card" onclick="sepeteEkle(${i})">${u.ad}</div>`
 ).join("");

 sepet.innerHTML = sepet.map((s,i)=>
 `<div class="card">
  ${s.ad} - ${s.fiyat}₺
 </div>`
 ).join("");

 let t = sepet.reduce((a,b)=>a+b.fiyat,0);
 toplam.innerText = t;

 odemeText.innerText = odemeTip || "Yok";

 raporRender();
 grafik();
}

// ➕ SEPETE EKLE
function sepeteEkle(i){
 if(urunler[i].stok <= 0){
  alert("Stok yok");
  return;
 }

 sepet.push({...urunler[i]});
 render();
}

// 💰 SATIŞ + FATURA + RAPOR
function satis(){

 if(!odemeTip){
  alert("Ödeme tipi seç!");
  return;
 }

 if(sepet.length === 0){
  alert("Sepet boş");
  return;
 }

 let toplamTutar = sepet.reduce((a,b)=>a+b.fiyat,0);

 let tarih = new Date().toLocaleString();

 let faturaHTML = `
 <h3>🧾 FATURA</h3>
 <hr>
 <b>Tarih:</b> ${tarih}<br>
 <b>Ödeme:</b> ${odemeTip}<br>
 <hr>
 ${sepet.map(s=>`<div>${s.ad} - ${s.fiyat}₺</div>`).join("")}
 <hr>
 <b>TOPLAM: ${toplamTutar} ₺</b>
 `;

 fatura.innerHTML = faturaHTML;

 // stok düş
 sepet.forEach(s=>{
  let u = urunler.find(x=>x.ad == s.ad);
  if(u && u.stok > 0) u.stok--;
 });

 kasa += toplamTutar;

 // RAPOR KAYDI
 satislar.push({
  tarih,
  odeme: odemeTip,
  toplam: toplamTutar,
  urunler: sepet.map(s=>s.ad)
 });

 sepet = [];
 odemeTip = null;

 save();
 render();
}

// 📊 RAPOR PANEL
function raporRender(){

 let gelir = satislar.reduce((a,b)=>a+b.toplam,0);

 let urunMap = {};

 satislar.forEach(s=>{
  s.urunler.forEach(u=>{
   urunMap[u] = (urunMap[u] || 0) + 1;
  });
 });

 let urunHTML = Object.keys(urunMap).map(k=>
 `<div>${k}: ${urunMap[k]} adet</div>`
 ).join("");

 raporPanel.innerHTML = `
 <h3>📊 RAPOR</h3>
 💰 Kasa: ${kasa} ₺<br>
 📈 Toplam Gelir: ${gelir} ₺<br>
 <hr>
 <b>Ürün Satışları:</b><br>
 ${urunHTML}
 `;
}

// 🧨 RAPOR SIFIRLA
function raporSifirla(){
 if(!confirm("Rapor silinecek")) return;
 satislar = [];
 save();
 render();
}

// 🔍 ARAMA
function filtre(){
 let q = ara.value.toLowerCase();

 urunSec.innerHTML = urunler
 .filter(u=>u.ad.toLowerCase().includes(q))
 .map((u,i)=>`<div class="card" onclick="sepeteEkle(${i})">${u.ad}</div>`)
 .join("");
}

// 📷 BARKOD
function kamera(){
 new Html5Qrcode("reader").start(
  { facingMode:"environment" },
  { fps:10 },
  code=>{
   let u = urunler.find(x=>x.kod==code);
   if(u && u.stok > 0){
    sepet.push({...u});
    render();
   }
  }
 );
}

// 📊 GRAFİK
function grafik(){
 new Chart(document.getElementById("chart"),{
  type:"bar",
  data:{
   labels:["Ürün","Kasa"],
   datasets:[{data:[urunler.length,kasa]}]
  }
 });
}

// 📁 EXCEL
function excel(){
 let ws = XLSX.utils.json_to_sheet(satislar);
 let wb = XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb, ws, "Rapor");
 XLSX.writeFile(wb, "rapor.xlsx");
}

show("urun");

</script>

</body>
</html>
