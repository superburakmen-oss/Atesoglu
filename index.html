<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATEŞOĞLU</title>

<style>
body { font-family:Arial; background:#111; color:#fff; padding:15px; }
h1 { text-align:center; color:#ff6600; }
input, select, button {
 width:100%; padding:10px; margin:5px 0;
 border:none; border-radius:8px;
}
button { background:#ff6600; color:white; }
.card { background:#222; padding:10px; margin-top:10px; border-radius:10px; }
.tabs button { width:24%; margin:2px; }
.page { display:none; }
</style>
</head>

<body>

<div id="loginPage">
<h2>🔐 Giriş</h2>
<input id="user" placeholder="Kullanıcı">
<input id="pass" type="password" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
</div>

<div id="app" style="display:none">

<h1>🔥 ATEŞOĞLU</h1>

<div class="tabs">
<button onclick="show('uretim')">Üretim</button>
<button onclick="show('stok')">Stok</button>
<button onclick="show('qr')">QR</button>
<button onclick="show('rapor')">Rapor</button>
</div>

<div id="uretim" class="page">
<h3>Üretim</h3>
<input id="urun" placeholder="Ürün">
<input id="adet" type="number" placeholder="Adet">
<select id="durum">
<option>Bekliyor</option>
<option>Üretimde</option>
<option>Tamamlandı</option>
</select>
<button onclick="ekleUretim()">Kaydet</button>
<div id="uretimList"></div>
</div>

<div id="stok" class="page">
<h3>Stok</h3>
<input id="stokAd" placeholder="Ürün">
<input id="stokAdet" type="number" placeholder="Adet">
<button onclick="stokEkle()">Ekle</button>
<div id="stokList"></div>
</div>

<div id="qr" class="page">
<h3>QR</h3>
<input id="qrInput" placeholder="QR kod">
<button onclick="qrKaydet()">Kaydet</button>
<div id="qrList"></div>
</div>

<div id="rapor" class="page">
<h3>Dashboard</h3>
<div id="dashboard"></div>
</div>

</div>

<script>

let uretim = JSON.parse(localStorage.getItem("uretim"))||[];
let stok = JSON.parse(localStorage.getItem("stok"))||[];
let qr = JSON.parse(localStorage.getItem("qr"))||[];

function login(){
 if(user.value=="admin" && pass.value=="1234"){
   loginPage.style.display="none";
   app.style.display="block";
   show("uretim");
 } else alert("Hatalı giriş");
}

function save(){
 localStorage.setItem("uretim",JSON.stringify(uretim));
 localStorage.setItem("stok",JSON.stringify(stok));
 localStorage.setItem("qr",JSON.stringify(qr));
}

function show(id){
 document.querySelectorAll(".page").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
 render();
}

function ekleUretim(){
 uretim.push({urun:urun.value,adet:adet.value,durum:durum.value});
 save(); render();
}

function stokEkle(){
 stok.push({ad:stokAd.value,adet:stokAdet.value});
 save(); render();
}

function qrKaydet(){
 qr.push(qrInput.value);
 save(); render();
}

function render(){
 uretimList.innerHTML = uretim.map(x=>
 `<div class="card">${x.urun} - ${x.adet} - ${x.durum}</div>`).join("");

 stokList.innerHTML = stok.map(x=>
 `<div class="card">${x.ad} - ${x.adet}</div>`).join("");

 qrList.innerHTML = qr.map(x=>
 `<div class="card">${x}</div>`).join("");

 dashboard.innerHTML = `
 Toplam Üretim: ${uretim.length}<br>
 Toplam Stok: ${stok.length}<br>
 QR Kayıt: ${qr.length}`;
}

</script>

</body>
</html>
