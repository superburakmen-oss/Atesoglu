<!-- SADECE SCRIPT KISMI DEĞİŞTİ -->
<script>

let urunler = JSON.parse(localStorage.getItem("urunler")) || [];
let sepet = [];
let kasa = Number(localStorage.getItem("kasa")) || 0;

// 💾 SAVE
function save(){
 localStorage.setItem("urunler", JSON.stringify(urunler));
 localStorage.setItem("kasa", kasa);
}

// 🛒 SEPETE EKLE (ADET SORAR)
function sepeteEkle(i){

 let miktar = prompt("Kaç adet eklemek istiyorsun?");
 if(!miktar) return;

 miktar = Number(miktar);

 if(miktar <= 0){
  alert("Geçersiz miktar");
  return;
 }

 if(urunler[i].stok < miktar){
  alert("Yeterli stok yok!");
  return;
 }

 sepet.push({
  ad: urunler[i].ad,
  fiyat: urunler[i].fiyat,
  adet: miktar
 });

 render();
}

// 📊 RENDER
function render(){

 kasaText.innerText = kasa;

 // ürün listesi
 urunList.innerHTML = urunler.map((u,i)=>
 `<div class="card">
  ${u.ad} - ${u.fiyat}₺ - Stok:${u.stok}
  <button onclick="urunSil(${i})">Sil</button>
 </div>`
 ).join("");

 // ürün seçme
 urunSec.innerHTML = urunler.map((u,i)=>
 `<div class="card" onclick="sepeteEkle(${i})">
  ${u.ad}
 </div>`
 ).join("");

 // 🛒 sepet
 sepet.innerHTML = sepet.map((s,i)=>
 `<div class="card">
  ${s.ad} - ${s.fiyat}₺ x ${s.adet}
 </div>`
 ).join("");

 // 💰 toplam
 let t = sepet.reduce((a,b)=>a+(b.fiyat*b.adet),0);
 toplam.innerText = t;

 grafik();
}

// 💰 SATIŞ (ADETLİ)
function satis(){

 if(sepet.length === 0){
  alert("Sepet boş");
  return;
 }

 let toplamTutar = sepet.reduce((a,b)=>a+(b.fiyat*b.adet),0);

 let tarih = new Date().toLocaleString();

 let faturaHTML = `
 <h3>🧾 FATURA</h3>
 <hr>
 <b>Tarih:</b> ${tarih}<br>
 <hr>
 ${sepet.map(s=>`<div>${s.ad} - ${s.adet} x ${s.fiyat}₺</div>`).join("")}
 <hr>
 <b>TOPLAM: ${toplamTutar} ₺</b>
 `;

 fatura.innerHTML = faturaHTML;

 // stok düş
 sepet.forEach(s=>{
  let u = urunler.find(x=>x.ad == s.ad);
  if(u){
   u.stok -= s.adet;
  }
 });

 kasa += toplamTutar;

 sepet = [];

 save();
 render();
}

</script>
