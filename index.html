<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATEŞOĞLU</title>

<style>
body { font-family:Arial; background:#111; color:#fff; padding:15px; }
h1 { text-align:center; color:#ff6600; }
input, select, button {
 width:100%; padding:10px; margin:5px 0;
 border:none; border-radius:8px;
}
button { background:#ff6600; color:white; }
.card { background:#222; padding:10px; margin-top:10px; border-radius:10px; }
.tabs button { width:24%; margin:2px; }
.page { display:none; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- QR -->
<script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h2>🔐 Giriş</h2>
<input id="user" placeholder="Kullanıcı">
<input id="pass" type="password" placeholder="Şifre">
<button onclick="login()">Giriş Yap</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h1>🔥 ATEŞOĞLU</h1>

<div class="tabs">
<button onclick="show('uretim')">Üretim</button>
<button onclick="show('stok')">Stok</button>
<button onclick="show('qr')">QR</button>
<button onclick="show('rapor')">Rapor</button>
</div>

<!-- ÜRETİM -->
<div id="uretim" class="page">
<h3>Üretim</h3>
<input id="urun" placeholder="Ürün">
<input id="adet" type="number" placeholder="Adet">
<select id="durum">
<option>Bekliyor</option>
<option>Üretimde</option>
<option>Tamamlandı</option>
</select>
<button onclick="ekleUretim()">Kaydet</button>
<div id="uretimList"></div>
</div>

<!-- STOK -->
<div id="stok" class="page">
<h3>Stok</h3>
<input id="stokAd" placeholder="Ürün">
<input id="stokAdet" type="number" placeholder="Adet">
<button onclick="stokEkle()">Ekle</button>
<div id="stokList"></div>
</div>

<!-- QR -->
<div id="qr" class="page">
<h3>QR Kamera</h3>
<button onclick="baslatQR()">Kamerayı Aç</button>
<div id="reader" style="margin-top:10px;"></div>
<div id="qrList"></div>
</div>

<!-- RAPOR -->
<div id="rapor" class="page">
<h3>Dashboard</h3>
<div id="dashboard"></div>
</div>

</div>

<script>

// 🔥 Firebase Config (BURAYI DEĞİŞTİR)
const firebaseConfig = {
  apiKey: "atesoglu",
  authDomain: "atesoglu-57896",
  projectId: "1:505669219781:web:8de5b1bdc7caa12b15c7ac",
};

// Firebase başlat
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOGIN
function login(){
 if(user.value=="admin" && pass.value=="1234"){
   loginPage.style.display="none";
   app.style.display="block";
   show("uretim");
 } else alert("Hatalı giriş");
}

// SAYFA GEÇİŞ
function show(id){
 document.querySelectorAll(".page").forEach(x=>x.style.display="none");
 document.getElementById(id).style.display="block";
}

// ÜRETİM EKLE
function ekleUretim(){
 db.collection("uretim").add({
   urun: urun.value,
   adet: adet.value,
   durum: durum.value
 });
}

// STOK EKLE
function stokEkle(){
 db.collection("stok").add({
   ad: stokAd.value,
   adet: stokAdet.value
 });
}

// QR KAYDET
function qrKaydet(kod){
 db.collection("qr").add({kod});
}

// QR BAŞLAT
function baslatQR(){
 new Html5Qrcode("reader").start(
   { facingMode: "environment" },
   { fps: 10 },
   (qrCode)=>{
     qrKaydet(qrCode);
     alert("QR okundu: " + qrCode);
   }
 );
}

// CANLI VERİLER

db.collection("uretim").onSnapshot(snap=>{
 let html="";
 snap.forEach(doc=>{
  let x = doc.data();
  html += `<div class="card">${x.urun} - ${x.adet} - ${x.durum}</div>`;
 });
 uretimList.innerHTML = html;
});

db.collection("stok").onSnapshot(snap=>{
 let html="";
 snap.forEach(doc=>{
  let x = doc.data();
  html += `<div class="card">${x.ad} - ${x.adet}</div>`;
 });
 stokList.innerHTML = html;
});

db.collection("qr").onSnapshot(snap=>{
 let html="";
 snap.forEach(doc=>{
  let x = doc.data();
  html += `<div class="card">${x.kod}</div>`;
 });
 qrList.innerHTML = html;
});

// DASHBOARD
setInterval(()=>{
 dashboard.innerHTML = `
 Üretim: ${uretimList.children.length}<br>
 Stok: ${stokList.children.length}<br>
 QR: ${qrList.children.length}`;
},1000);

</script>

</body>
</html>
