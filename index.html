<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Stok Takip Sistemi</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f4f4f4;
        }

        h1 { color: #333; }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #222;
            color: white;
        }

        .btn {
            cursor: pointer;
            border: none;
            padding: 8px 12px;
        }

        .delete {
            background: red;
            color: white;
        }

        .reset {
            background: darkorange;
            color: white;
        }

        .add {
            background: green;
            color: white;
        }
    </style>
</head>

<body>

<h1>📦 Stok Takip Sistemi</h1>

<input type="text" id="productName" placeholder="Ürün adı">
<input type="number" id="productQty" placeholder="Adet">

<button class="btn add" onclick="addStock()">Ekle</button>
<button class="btn reset" onclick="resetAllStocks()">Tüm Stoku Sıfırla</button>

<table>
    <thead>
        <tr>
            <th>Ürün</th>
            <th>Adet</th>
            <th>İşlem</th>
        </tr>
    </thead>
    <tbody id="stockTable"></tbody>
</table>

<script>
let stocks = JSON.parse(localStorage.getItem("stocks")) || [];

// EKLE
function addStock() {
    let name = document.getElementById("productName").value;
    let qty = document.getElementById("productQty").value;

    if (!name || !qty) {
        alert("Lütfen tüm alanları doldur");
        return;
    }

    stocks.push({
        name: name,
        quantity: Number(qty)
    });

    localStorage.setItem("stocks", JSON.stringify(stocks));

    document.getElementById("productName").value = "";
    document.getElementById("productQty").value = "";

    renderStocks();
}

// SİL
function deleteStock(index) {
    stocks.splice(index, 1);

    localStorage.setItem("stocks", JSON.stringify(stocks));

    renderStocks();
}

// SIFIRLA
function resetAllStocks() {
    if (!confirm("Tüm stoklar silinecek. Emin misin?")) return;

    localStorage.removeItem("stocks");
    stocks = [];

    renderStocks();
}

// LİSTELE
function renderStocks() {
    let table = document.getElementById("stockTable");
    table.innerHTML = "";

    stocks.forEach((item, index) => {
        table.innerHTML += `
            <tr>
                <td>${item.name}</td>
                <td>${item.quantity}</td>
                <td>
                    <button class="btn delete" onclick="deleteStock(${index})">Sil</button>
                </td>
            </tr>
        `;
    });
}

// ilk yükleme
renderStocks();
</script>

</body>
</html>
